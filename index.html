<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Notebook</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .nav-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .nav-tab {
            flex: 1;
            padding: 15px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            color: #666;
            transition: all 0.3s ease;
        }

        .nav-tab.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .nav-tab:hover {
            background: #e9ecef;
        }

        .tab-content {
            display: none;
            padding: 30px;
        }

        .tab-content.active {
            display: block;
        }

        /* Notes Section */
        .notes-section {
            display: grid;
            gap: 20px;
        }

        .note-input {
            display: grid;
            gap: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-group label {
            font-weight: 600;
            color: #333;
        }

        .input-group input,
        .input-group textarea,
        .input-group select {
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus,
        .input-group textarea:focus,
        .input-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .note-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #667eea;
            transition: transform 0.3s ease;
        }

        .note-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .note-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
        }

        .note-subject {
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .note-content {
            color: #666;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .note-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: #999;
        }

        .note-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.8rem;
        }

        /* Flashcards Section */
        .flashcard-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .flashcard {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            min-height: 300px;
            perspective: 1000px;
            margin-bottom: 20px;
        }

        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 300px;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .flashcard.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }

        .flashcard-front,
        .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            border-radius: 15px;
        }

        .flashcard-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .flashcard-back {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            color: white;
            transform: rotateY(180deg);
        }

        .flashcard-text {
            font-size: 1.5rem;
            font-weight: 300;
            line-height: 1.4;
        }

        .flashcard-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        /* Progress Section */
        .progress-section {
            display: grid;
            gap: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 1rem;
            opacity: 0.9;
        }

        .progress-bar {
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            height: 20px;
            margin: 10px 0;
        }

        .progress-fill {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.5s ease;
        }

        /* Search and Filter */
        .search-filter {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-filter input,
        .search-filter select {
            flex: 1;
            min-width: 200px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .nav-tabs {
                flex-direction: column;
            }

            .search-filter {
                flex-direction: column;
            }

            .notes-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state img {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Study Notebook</h1>
            <p>Organize your learning journey with notes, flashcards, and progress tracking</p>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showTab('notes')">📝 Notes</button>
            <button class="nav-tab" onclick="showTab('flashcards')">🃏 Flashcards</button>
            <button class="nav-tab" onclick="showTab('progress')">📊 Progress</button>
            <button class="nav-tab" onclick="showTab('schedule')">📅 Schedule</button>
        </div>

        <!-- Notes Tab -->
        <div id="notes" class="tab-content active">
            <div class="notes-section">
                <div class="note-input">
                    <h2>Add New Note</h2>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="input-group">
                            <label for="noteTitle">Title</label>
                            <input type="text" id="noteTitle" placeholder="Enter note title">
                        </div>
                        <div class="input-group">
                            <label for="noteSubject">Subject</label>
                            <select id="noteSubject">
                                <option value="Mathematics">Mathematics</option>
                                <option value="Science">Science</option>
                                <option value="History">History</option>
                                <option value="Literature">Literature</option>
                                <option value="Computer Science">Computer Science</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="noteContent">Content</label>
                        <textarea id="noteContent" placeholder="Enter your notes here..."></textarea>
                    </div>
                    <button class="btn btn-primary" onclick="addNote()">Add Note</button>
                </div>

                <div class="search-filter">
                    <input type="text" id="searchNotes" placeholder="Search notes..." onkeyup="filterNotes()">
                    <select id="filterSubject" onchange="filterNotes()">
                        <option value="">All Subjects</option>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Science">Science</option>
                        <option value="History">History</option>
                        <option value="Literature">Literature</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div id="notesGrid" class="notes-grid">
                    <!-- Notes will be dynamically added here -->
                </div>
            </div>
        </div>

        <!-- Flashcards Tab -->
        <div id="flashcards" class="tab-content">
            <div class="flashcard-container">
                <h2>Flashcards</h2>
                <div style="margin-bottom: 20px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                        <div class="input-group">
                            <label for="flashcardFront">Front (Question)</label>
                            <textarea id="flashcardFront" placeholder="Enter question or term"></textarea>
                        </div>
                        <div class="input-group">
                            <label for="flashcardBack">Back (Answer)</label>
                            <textarea id="flashcardBack" placeholder="Enter answer or definition"></textarea>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="addFlashcard()">Add Flashcard</button>
                </div>

                <div id="flashcardDisplay">
                    <!-- Flashcards will be displayed here -->
                </div>

                <div class="flashcard-controls" id="flashcardControls" style="display: none;">
                    <button class="btn btn-secondary" onclick="previousCard()">← Previous</button>
                    <button class="btn btn-primary" onclick="flipCard()">Flip Card</button>
                    <button class="btn btn-secondary" onclick="nextCard()">Next →</button>
                </div>
            </div>
        </div>

        <!-- Progress Tab -->
        <div id="progress" class="tab-content">
            <div class="progress-section">
                <h2>Study Progress</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number" id="totalNotes">0</div>
                        <div class="stat-label">Total Notes</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="totalFlashcards">0</div>
                        <div class="stat-label">Flashcards</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="studyStreak">0</div>
                        <div class="stat-label">Study Streak</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="totalSubjects">0</div>
                        <div class="stat-label">Subjects</div>
                    </div>
                </div>

                <div style="margin-top: 30px;">
                    <h3>Subject Progress</h3>
                    <div id="subjectProgress">
                        <!-- Subject progress bars will be added here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Schedule Tab -->
        <div id="schedule" class="tab-content">
            <h2>Study Schedule</h2>
            <div style="display: grid; gap: 20px;">
                <div class="input-group">
                    <label for="scheduleDate">Date</label>
                    <input type="date" id="scheduleDate">
                </div>
                <div class="input-group">
                    <label for="scheduleTime">Time</label>
                    <input type="time" id="scheduleTime">
                </div>
                <div class="input-group">
                    <label for="scheduleSubject">Subject</label>
                    <select id="scheduleSubject">
                        <option value="Mathematics">Mathematics</option>
                        <option value="Science">Science</option>
                        <option value="History">History</option>
                        <option value="Literature">Literature</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="scheduleTask">Task</label>
                    <input type="text" id="scheduleTask" placeholder="What will you study?">
                </div>
                <button class="btn btn-primary" onclick="addScheduleItem()">Add to Schedule</button>
            </div>

            <div id="scheduleList" style="margin-top: 30px;">
                <!-- Schedule items will be displayed here -->
            </div>
        </div>
    </div>

    <script>
        // Data storage
        let notes = JSON.parse(localStorage.getItem('studyNotes')) || [];
        let flashcards = JSON.parse(localStorage.getItem('studyFlashcards')) || [];
        let schedule = JSON.parse(localStorage.getItem('studySchedule')) || [];
        let currentFlashcardIndex = 0;

        // Tab functionality
        function showTab(tabName) {
            // Hide all tab contents
            const tabContents = document.querySelectorAll('.tab-content');
            tabContents.forEach(tab => tab.classList.remove('active'));

            // Remove active class from all nav tabs
            const navTabs = document.querySelectorAll('.nav-tab');
            navTabs.forEach(tab => tab.classList.remove('active'));

            // Show selected tab content
            document.getElementById(tabName).classList.add('active');

            // Add active class to clicked nav tab
            event.target.classList.add('active');

            // Update displays when switching tabs
            if (tabName === 'progress') {
                updateProgress();
            } else if (tabName === 'flashcards') {
                displayFlashcards();
            } else if (tabName === 'notes') {
                displayNotes();
            } else if (tabName === 'schedule') {
                displaySchedule();
            }
        }

        // Notes functionality
        function addNote() {
            const title = document.getElementById('noteTitle').value.trim();
            const subject = document.getElementById('noteSubject').value;
            const content = document.getElementById('noteContent').value.trim();

            if (!title || !content) {
                alert('Please fill in both title and content.');
                return;
            }

            const note = {
                id: Date.now(),
                title: title,
                subject: subject,
                content: content,
                date: new Date().toLocaleDateString(),
                time: new Date().toLocaleTimeString()
            };

            notes.push(note);
            localStorage.setItem('studyNotes', JSON.stringify(notes));

            // Clear form
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteContent').value = '';

            displayNotes();
            updateProgress();
        }

        function displayNotes() {
            const notesGrid = document.getElementById('notesGrid');
            
            if (notes.length === 0) {
                notesGrid.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 4rem; margin-bottom: 20px;">📝</div>
                        <h3>No notes yet</h3>
                        <p>Start by adding your first study note above!</p>
                    </div>
                `;
                return;
            }

            notesGrid.innerHTML = notes.map(note => `
                <div class="note-card fade-in">
                    <div class="note-header">
                        <div class="note-title">${note.title}</div>
                        <div class="note-subject">${note.subject}</div>
                    </div>
                    <div class="note-content">${note.content}</div>
                    <div class="note-meta">
                        <span>${note.date} at ${note.time}</span>
                        <div class="note-actions">
                            <button class="btn btn-danger btn-small" onclick="deleteNote(${note.id})">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function deleteNote(id) {
            if (confirm('Are you sure you want to delete this note?')) {
                notes = notes.filter(note => note.id !== id);
                localStorage.setItem('studyNotes', JSON.stringify(notes));
                displayNotes();
                updateProgress();
            }
        }

        function filterNotes() {
            const searchTerm = document.getElementById('searchNotes').value.toLowerCase();
            const filterSubject = document.getElementById('filterSubject').value;

            const filteredNotes = notes.filter(note => {
                const matchesSearch = note.title.toLowerCase().includes(searchTerm) || 
                                    note.content.toLowerCase().includes(searchTerm);
                const matchesSubject = !filterSubject || note.subject === filterSubject;
                return matchesSearch && matchesSubject;
            });

            const notesGrid = document.getElementById('notesGrid');
            if (filteredNotes.length === 0) {
                notesGrid.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 4rem; margin-bottom: 20px;">🔍</div>
                        <h3>No notes found</h3>
                        <p>Try adjusting your search or filter criteria.</p>
                    </div>
                `;
                return;
            }

            notesGrid.innerHTML = filteredNotes.map(note => `
                <div class="note-card fade-in">
                    <div class="note-header">
                        <div class="note-title">${note.title}</div>
                        <div class="note-subject">${note.subject}</div>
                    </div>
                    <div class="note-content">${note.content}</div>
                    <div class="note-meta">
                        <span>${note.date} at ${note.time}</span>
                        <div class="note-actions">
                            <button class="btn btn-danger btn-small" onclick="deleteNote(${note.id})">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Flashcards functionality
        function addFlashcard() {
            const front = document.getElementById('flashcardFront').value.trim();
            const back = document.getElementById('flashcardBack').value.trim();

            if (!front || !back) {
                alert('Please fill in both front and back of the flashcard.');
                return;
            }

            const flashcard = {
                id: Date.now(),
                front: front,
                back: back,
                date: new Date().toLocaleDateString()
            };

            flashcards.push(flashcard);
            localStorage.setItem('studyFlashcards', JSON.stringify(flashcards));

            // Clear form
            document.getElementById('flashcardFront').value = '';
            document.getElementById('flashcardBack').value = '';

            displayFlashcards();
            updateProgress();
        }

        function displayFlashcards() {
            const flashcardDisplay = document.getElementById('flashcardDisplay');
            const flashcardControls = document.getElementById('flashcardControls');

            if (flashcards.length === 0) {
                flashcardDisplay.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 4rem; margin-bottom: 20px;">🃏</div>
                        <h3>No flashcards yet</h3>
                        <p>Create your first flashcard above!</p>
                    </div>
                `;
                flashcardControls.style.display = 'none';
                return;
            }

            flashcardControls.style.display = 'flex';
            showFlashcard(currentFlashcardIndex);
        }

        function showFlashcard(index) {
            if (index < 0 || index >= flashcards.length) return;

            const flashcard = flashcards[index];
            const flashcardDisplay = document.getElementById('flashcardDisplay');

            flashcardDisplay.innerHTML = `
                <div class="flashcard" onclick="flipCard()">
                    <div class="flashcard-inner">
                        <div class="flashcard-front">
                            <div class="flashcard-text">${flashcard.front}</div>
                        </div>
                        <div class="flashcard-back">
                            <div class="flashcard-text">${flashcard.back}</div>
                        </div>
                    </div>
                </div>
                <div style="text-align: center; margin-top: 15px; color: #666;">
                    Card ${index + 1} of ${flashcards.length}
                </div>
            `;
        }

        function flipCard() {
            const flashcard = document.querySelector('.flashcard');
            if (flashcard) {
                flashcard.classList.toggle('flipped');
            }
        }

        function nextCard() {
            if (currentFlashcardIndex < flashcards.length - 1) {
                currentFlashcardIndex++;
                showFlashcard(currentFlashcardIndex);
            }
        }

        function previousCard() {
            if (currentFlashcardIndex > 0) {
                currentFlashcardIndex--;
                showFlashcard(currentFlashcardIndex);
            }
        }

        // Schedule functionality
        function addScheduleItem() {
            const date = document.getElementById('scheduleDate').value;
            const time = document.getElementById('scheduleTime').value;
            const subject = document.getElementById('scheduleSubject').value;
            const task = document.getElementById('scheduleTask').value.trim();

            if (!date || !time || !task) {
                alert('Please fill in all fields.');
                return;
            }

            const scheduleItem = {
                id: Date.now(),
                date: date,
                time: time,
                subject: subject,
                task: task,
                completed: false
            };

            schedule.push(scheduleItem);
            localStorage.setItem('studySchedule', JSON.stringify(schedule));

            // Clear form
            document.getElementById('scheduleDate').value = '';
            document.getElementById('scheduleTime').value = '';
            document.getElementById('scheduleTask').value = '';

            displaySchedule();
        }

        function displaySchedule() {
            const scheduleList = document.getElementById('scheduleList');
            
            if (schedule.length === 0) {
                scheduleList.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 4rem; margin-bottom: 20px;">📅</div>
                        <h3>No scheduled items</h3>
                        <p>Add your first study session above!</p>
                    </div>
                `;
                return;
            }

            // Sort schedule by date and time
            const sortedSchedule = schedule.sort((a, b) => {
                const dateA = new Date(a.date + ' ' + a.time);
                const dateB = new Date(b.date + ' ' + b.time);
                return dateA - dateB;
            });

            scheduleList.innerHTML = sortedSchedule.map(item => `
                <div class="note-card ${item.completed ? 'completed' : ''}">
                    <div class="note-header">
                        <div class="note-title">${item.task}</div>
                        <div class="note-subject">${item.subject}</div>
                    </div>
                    <div class="note-meta">
                        <span>${new Date(item.date).toLocaleDateString()} at ${item.time}</span>
                        <div class="note-actions">
                            <button class="btn ${item.completed ? 'btn-secondary' : 'btn-primary'} btn-small" 
                                onclick="toggleScheduleComplete(${item.id})">
                                ${item.completed ? 'Undo' : 'Complete'}
                            </button>
                            <button class="btn btn-danger btn-small" onclick="deleteScheduleItem(${item.id})">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleScheduleComplete(id) {
            const item = schedule.find(item => item.id === id);
            if (item) {
                item.completed = !item.completed;
                localStorage.setItem('studySchedule', JSON.stringify(schedule));
                displaySchedule();
            }
        }

        function deleteScheduleItem(id) {
            if (confirm('Are you sure you want to delete this scheduled item?')) {
                schedule = schedule.filter(item => item.id !== id);
                localStorage.setItem('studySchedule', JSON.stringify(schedule));
                displaySchedule();
            }
        }

        // Progress functionality
        function updateProgress() {
            document.getElementById('totalNotes').textContent = notes.length;
            document.getElementById('totalFlashcards').textContent = flashcards.length;
            
            // Calculate unique subjects
            const subjects = new Set();
            notes.forEach(note => subjects.add(note.subject));
            document.getElementById('totalSubjects').textContent = subjects.size;

            // Simple streak calculation (days with notes)
            const today = new Date().toLocaleDateString();
            const notesToday = notes.filter(note => note.date === today).length;
            document.getElementById('studyStreak').textContent = notesToday > 0 ? '1' : '0';

            // Update subject progress
            updateSubjectProgress();
        }

        function updateSubjectProgress() {
            const subjectProgress = document.getElementById('subjectProgress');
            const subjectCounts = {};

            notes.forEach(note => {
                subjectCounts[note.subject] = (subjectCounts[note.subject] || 0) + 1;
            });

            const totalNotes = notes.length;
            if (totalNotes === 0) {
                subjectProgress.innerHTML = '<p style="text-align: center; color: #666;">No progress data yet. Start adding notes!</p>';
                return;
            }

            subjectProgress.innerHTML = Object.entries(subjectCounts).map(([subject, count]) => {
                const percentage = Math.round((count / totalNotes) * 100);
                return `
                    <div style="margin-bottom: 15px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                            <span>${subject}</span>
                            <span>${count} notes (${percentage}%)</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${percentage}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Initialize the app
        function initApp() {
            displayNotes();
            updateProgress();
            
            // Set today's date as default for schedule
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('scheduleDate').value = today;
        }

        // Load the app when page loads
        window.addEventListener('load', initApp);
    </script>
</body>
</html>
